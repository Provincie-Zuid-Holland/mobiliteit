<!DOCTYPE html>
<html lang="nl">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Klok</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        body {
            border-radius: 20px;
            overflow: hidden;
        }
        #timer {
            font-size: 4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="timer">--</div>
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function updateClock() {
            const remSize = Number(getQueryParam('rem')) || 4;
            document.getElementById('timer').style.fontSize = `${remSize}rem`;

            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            let display = `${hours}:${minutes}`;

            const duetijd = getQueryParam('due');
            const warn = Number(getQueryParam('warn')) || 3;
            if (duetijd) {
                const [h, m] = duetijd.split(':').map(Number);
                if (!isNaN(h) && !isNaN(m)) {
                    const due = new Date();
                    due.setHours(h, m, 0, 0);
                    const diffMs = due - now;
                    const diffMin = Math.floor(diffMs / (1000 * 60));
                    const overschredenMin = Math.floor(Math.abs(diffMs) / (1000 * 60));
                    if (diffMin > 0 && diffMin <= 15) {
                        display += ` (${diffMin})`;
                    } else if (diffMin < 0 && overschredenMin <= 30 && overschredenMin > 0) {
                        display += ` (-${overschredenMin})`;
                    }
                    if (diffMin <= warn || diffMin < 0) {
                        document.body.style.backgroundColor = 'red';
                    } else {
                        document.body.style.backgroundColor = 'black';
                    }
                }
            }

            document.getElementById('timer').textContent = display;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
