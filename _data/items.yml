- title: Zorg voor voorzieningen dichtbij
  url: https://provincie-zuid-holland.github.io/mobiliteit/snelstudie/zorg-voor-voorzieningen-dichtbij
  image: img/the-15-minute-city-paris-landscape-credit-micael.jpg
  description: Een pleidooi voor nabijheid in Zuid-Holland. Decennia van centralisatie en functiescheiding hebben bereikbaarheid afgewenteld op mobiliteit, maar geld en ruimte voor meer asfalt zijn op. Deze snelstudie laat met een toolkit en concrete voorbeelden zien hoe we voorzieningen weer dichter bij mensen brengen via ruimtelijke ordening, functiemenging en parkeernormen.

- title: Negen kansen voor bereikbaarheid (werktitel)
  url: https://provincie-zuid-holland.github.io/mobiliteit/kansen/
  image: img/busstationleiden.jpg
  description: Een paar jaar geleden is de snelstudie Acht kansen voor mobiliteit gemaakt. Die studie kon op veel enthousiasme reken bij beleidsmakers en bestuurders, ook bij de Zuid-Hollandse gemeenten. De studie is inmiddels echter wel wat gedateerd. We werken aan de actualisatie en willen het iets breder trekken naar kansen voor bereikbaarheid. Kortom, een actualisatie slag en opfrisbeurt. De hoofdlijn staat online. Detailering komt in juni.

- title: Logistiek voor korte voedselketens - Van boer naar bord
  url: https://provincie-zuid-holland.github.io/mobiliteit/snelstudie/voedsel-van-dichtbij.html
  image: img/korteketen.jpg
  description: Meer voedsel van dichtbij is een streven van Zuid-Holland, samen met onder andere De Tuin van Holland (gezonde, seizoensgebonden en duurzame Nederlandse keuken voor iedereen). Daarvoor zijn korte ketens nodig. Deze studie is nog niet voltooid.


- title: Efficiëntere stationsstallingen - stimuleer de deelfiets meer
  url: https://provincie-zuid-holland.github.io/mobiliteit/snelstudie/fietsenstalling
  image: img\Fietsenstalling-Den-Haag.jpg
  description: Tussen verschillende groepen fietsenstallers bestaan grote verschillen in de duur dat hun fiets tussen twee ritten stilstaat. Die stallingsduur blijkt een sleutel in hoe we stationsstallingen efficiënter kunnen benutten, zodat we minder stallingsruimte hoeven bij te bouwen. 

- title: De Kracht van nabijheid
  url: https://provincie-zuid-holland.github.io/mobiliteit/snelstudie/nabijheid
  image: img/img-nabijheid/compactestad.png
  description: Met voorzieningen dichtbij hoeven bewoners minder ver te reizen, lopen ze vaker, fietsen ze meer, pakken ze vaker het OV en verbetert hun bereikbaarheid. Als mensen minder afhankelijk van de auto zijn, schept dat ook ruimte voor compacter bouwen van woningen, bedrijvigheid en voorzieningen.

- title: Zuid-Holland, Ga gewoon fietsen
  url: https://provincie-Zuid-Holland.github.io/mobiliteit/snelstudie/fiets
  image: img/img-fiets/fiets.jpg
  description: Hoe mooi kan Zuid-Holland worden als we de komende tien jaar flink meer gaan fietsen? En welke maatregelen kunnen we dan nemen? Dat zijn de vragen van deze snelstudie, een compact onderzoek binnen Kennis Zuid-Holland ter inspiratie. Fietsen is een leuke gezonde en goedkope manier van verplaatsen met veel voordelen voor de hele samenleving. Daarom doet de provincie Zuid-Holland de oproep Ga gewoon fietsen. 

- title: Mensen nemen vaker trein bij verbeterd deelfietsaanbod
  url: https://provincie-Zuid-Holland.github.io/mobiliteit/snelstudie/treinfietscombi
  image: img/deelfiets_vaker_trein.jpg
  description: Als we op onze bestemming net zo makkelijk een fiets zouden kunnen pakken als thuis – bijvoorbeeld met deelfietsen op meer stations – dan groeit het gebruik van de trein 33 procent en daalt het gebruik van de auto 5 procent in Nederland. Dat geldt voor alle verplaatsingen van in totaal 10 kilometer en meer.

- title: Acht kansen voor mobiliteit
  url: https://kennis.zuid-holland.nl/kansen-voor-mobiliteit/
  image: img/busstationleiden.jpg
  description: Deze studie is ter inspiratie voor aansprekend mobiliteitsbeleid en doordachte ruimtelijke ordening die passen bij de grote opgaven van deze tijd (energie, klimaat, stikstof & woningen). Graag gaan we samen op weg naar een duurzaam en prettig Zuid-Holland waar het voor iedereen goed wonen, werken en leven is.

- title: OV verbreden naar publiek vervoer
  url: https://provincie-Zuid-Holland.github.io/mobiliteit/snelstudie/ov
  image: img/img-ov/praatplaat.jpg
  description: Publieke mobiliteit is de manier om van A naar B te komen als je niet met je eigen vervoer reist. Het gaat niet alleen om openbaar vervoer, maar ook om deelmobiliteit, flexvervoer, meerijdiensten, doelgroepenvervoer en hubs. Er liggen kansen in Zuid-Holland voor!

- title: De ideale woonwijk, nabij voorzieningen en OV
  url: https://www.zuid-holland.nl/actueel/kennis-zuid-holland/onderzoeken-1/overzicht-onderzoeken/snelstudie-ideale-woonwijk-nabij-voorzieningen-ov/
  image: img/woonwijk.png
  description: Hoe ziet de ideale wijk er uit? Waar ligt die (dicht bij OV?) en hoe zit het met de nabijheid voorzieningen als winkels, gezondheidszorg, werkgelegenheid en recreatie?

- title: Sneller reizen met de bus in Zuid-Holland
  url: https://www.zuid-holland.nl/actueel/kennis-zuid-holland/onderzoeken-1/overzicht-onderzoeken/snelstudie-sneller-reizen-bus-zuid-holland/
  image: img/bus.jpg
  description: Het busvervoer staat onder druk door de grote overheidsbijdrage die nodig is om het systeem draaiende te houden. (2021)

- title: Dicht bij huis werken in de Thuiswerkhub
  url: https://www.zuid-holland.nl/actueel/kennis-zuid-holland/onderzoeken-1/overzicht-onderzoeken/snelstudie-dicht-huis-werken-thuiswerkhub/
  image: img/thuiswerkhub.jpg
  description: Dichter bij huis werken (in zogenoemde thuiswerkhubs) kan bijdragen aan een beter bereikbare provincie waarin het goed toeven is. (2021)

- title: Kansen voor deelfiets en deelscooter in Zuid-Holland
  url: https://www.zuid-holland.nl/actueel/kennis-zuid-holland/onderzoeken-1/overzicht-onderzoeken/snelstudie-kansen-deelfiets-deelscooter-zuid/
  image: img/snelstudiedeelm.jpg
  description: Er liggen kansen in Zuid-Holland voor deelfietsen en deelscooters. Vooral in de grote steden zijn deze deelvoertuigen al aan een flinke opmars bezig, maar dragen deelfietsen en deelscooters ook bij aan een betere mobiliteit? (2021)

- title: Hoe verleiden we reizigers om slimmer (dan met een auto) te reizen?
  url: https://kennis.zuid-holland.nl/onderzoeken/snelstudie-hoe-verleiden-we-reizigers-om-slimmer-dan-met-een-auto-te-reizen/
  image: img/verleiden.png
  description: In deze snelstudie staan een groot aantal maatregelen om mensen aan te zetten slimmer te reizen dan met een auto. Vervolgens zijn de gerangschikt op urgentie en kansrijkheid. (2020)

