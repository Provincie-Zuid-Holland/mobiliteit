
- title: 1. Voorzieningen dichtbij huis
  url: https://kennis.zuid-holland.nl/nabijheid/
  image: img/bereikbaarheid-door-nabijheid.jpg
  description: Wonen & werken bij voorzieningen en goed OV maken dat je veel bestemmingen goed kunt bereiken. Mobiliteit begint daarom met verstandige ruimtelijke ordening. Liggen wonen en werk ver van elkaar, dan moeten mensen langer reizen en kiezen ze vaker voor de auto dan de fiets. Woon je dichtbij veel voorzieningen en hoogwaardig (dus betrouwbaar, comfortabel, frequent en snel) OV, dan ben je minder tijd kwijt aan reizen en kun je ook makkelijker kiezen voor lopen en fietsen. 

- title: 2. Prioriteit voor lopen & fietsen
  url: https://kennis.zuid-holland.nl/fiets/
  image: img/prio-voor-lopen.jpg
  description: Steeds meer overheden omarmen het STOMP-principe. STOMP staat voor Stappen (lopen), Trappen (fietsen), OV (openbaar vervoer), MaaS (mobiliteitsdiensten, zoals deelvervoer) en Personenauto, in díe volgorde. Dus prioriteit voor de actieve vervoerwijzen lopen & fietsen, vooral in de bebouwde omgeving. Denk aan aantrekkelijke, groene en veilige loop- en (door)fietsroutes en aan voldoende mogelijkheden en ruimte om fietsen veilig te stallen. Lopen en fietsen is gezond, schoon en stil. 

- title: 3. Ruim baan voor openbaar vervoer & publieke mobiliteit
  url: https://kennis.zuid-holland.nl/onderzoeken/snelstudie-sneller-reizen-met-de-bus-in-zuid-holland/
  image: img/busstationleiden.jpg
  description: De kracht van het openbaar vervoer is het bundelen van individuele ritten tot collectieve stromen. Hoe meer reizigers, des te hoger de frequentie. Collectief vervoer met bussen en treinen scheelt ruimte op de weg en in steden, levert veiliger verkeer op en is beter voor het klimaat. Overheden kunnen het OV versnellen & stimuleren, zodat het meer reizigers trekt. Ze kunnen ook zorgen dat de internationale trein terrein wint op het vliegtuig voor reizen tot 750 kilometer. Onder publieke mobiliteit vallen alle manieren om van A naar B te reizen als je niet met eigen vervoer rijdt. De basis is het openbaar vervoer, met daarnaast ook taxibusjes (van gemeenten of regio’s) en deelvervoer (deelfiets, deelauto). Het idee is dan dat je (bijna) altijd overal kunt komen, ook zonder eigen auto of fiets. 

- title: 4. Deelvervoer & hubs
  url: https://kennis.zuid-holland.nl/treingebruik-deelfiets/
  image: /mobiliteit/snelstudie/img/deelfiets_vaker_trein.jpg
  description: Je hoeft niet overal een fiets te hebben, maar wilt misschien wel overal een fiets kunnen gebruiken. Dat is de deelfiets. Omdat een deelfiets na elkaar meerdere ‘baasjes’ heeft, gebruikt hij minder ruimte dan tweede of derde privéfietsen die bij een station gestald staan. Er zijn ook deelbakfietsen, deelscooters en deelauto’s. Om fiets, OV, deelvervoer en auto handig te kunnen combineren, moet je zo snel en makkelijk kunnen overstappen bij stations, R-nethaltes hubs of andere knooppunten.

- title: 5. Minder verkeersdoden en -gewonden
  url: https://kennis.zuid-holland.nl/treingebruik-deelfiets/
  image: img/veiligernaarschool.jpg
  description: Elk jaar vallen er in heel Zuid-Holland ongeveer 100 doden (waarvan 10 op provinciale wegen) en 10.000 gewonden in het verkeer. Die aantallen verkeersslachtoffers stijgen onder andere door een combinatie van meer inwoners, meer ouderen, meer voertuigen, grotere voertuigen, snellere voertuigen, meer snelheidsverschillen en meer afleiding. Om het verkeer veiliger te maken, zijn meer maatregelen nodig zoals betere wegen (met meer 30 km-zones, bredere fietspaden), meer verkeersonderwijs en striktere handhaving. Het nationale doel is om in 2050 nul verkeersdoden te hebben. 


- title: 6. Mobiliteit voor iedereen
  url: https://kennis.zuid-holland.nl/treingebruik-deelfiets/
  image: img/vervoersarmoede.jpg
  description: Als voetganger met een beperking loop je regelmatig tegen obstakels aan. Niet iedereen durft te fietsen. Vrouwen voelen zich soms onveilig op straat of in het OV. Sommige parkeergarages zijn eng. En niet ieder huishouden heeft genoeg geld voor een fiets, het OV of de auto. Maar iedereen moet kunnen meedoen, naar school, studie of werk. Iedereen moet naar de dokter of de winkel of wil naar het park, sportveld of theater. Daarom moet er voor iedereen geschikte mobiliteit zijn.


- title: 7. Duurzaam & schoon vervoer (mensen & goederen)
  url: https://kennis.zuid-holland.nl/onderzoeken/snelstudie-hoe-verleiden-we-reizigers-om-slimmer-dan-met-een-auto-te-reizen/
  image: img/schip.jpg
  description: Het overgrote deel van de voer- en vaartuigen in Zuid-Holland gebruikt nog fossiele brandstoffen. Dat veroorzaakt het broeikasgas CO2 en schadelijk fijnstof en stikstof. De ambitie is om met grote stappen naar nul uitstoot te gaan, uiterlijk in 2050. Auto’s, bussen, bestelwagens, vrachtwagens en schepen. Die kunnen allemaal vooruit op elektriciteit (of waterstof). Inmiddels hebben al vijf  Zuid-Hollandse gemeenten een zero-emissiezone ingevoerd. Dat zijn Delft, Den Haag, Gouda, Leiden en  Rotterdam. Alphen aan den Rijn en Dordrecht werken eraan. www.opwegnaarzes.nl


- title: 8. Slimme mobiliteit
  url: https://kennis.zuid-holland.nl/kansen-voor-mobiliteit/
  image: img/smart-mobility.jpg
  description: Smart mobility is een term die vaak valt voor het oplossen van mobiliteitsproblemen. Het gaat over het samenbrengen én sturen van vraag en aanbod (diensten, verkeer, systemen).  Denk aan verkeersmanagement voor ‘groene golven’, de kans op ongevallen, de kortste brugopeningen, de snelste ritten en werkzaamheden aan de weg. Of zelfs aan zelfrijdende auto’s, bussen, metro’s en vrachtwagens. Deze slimme mobiliteit kan helpen ons verkeer aantrekkelijker, duurzamer, efficiënter, schoner, toegankelijker én veiliger te maken, ook door alternatieven als lopen, fietsen en OV bij automobilisten in beeld te brengen. 

- title: 9. Goed functionerende & circulaire infrastructuur
  url: https://kennis.zuid-holland.nl/ov/
  image: img/slim-onderhoud.png
  description: Infrastructuur moet goed worden onderhouden. Veel naoorlogse auto-, spoor- en waterwegen, bruggen, tunnels en viaducten zijn aan groot onderhoud toe, ook door intensiever gebruik en zwaardere voertuigen. Dat kost veel tijd en geld en moeten we dus slim doen. De provincie Zuid-Holland wil in 2050 circulair zijn, dus reststromen volledig opnieuw benutten. Oók op het gebied van infrastructuur. Circulaire infra zorgt ervoor dat we ons milieu schoner achterlaten en minder afhankelijk worden van grondstoffen, ook uit andere landen.

- title: Veranderingen draaien om gedrag
  url: https://kennis.zuid-holland.nl/ov/
  image: img/gedrag.png
  description: Om de kansen voor mobiliteit optimaal te benutten en effectief beleid te maken, moeten we rekening te houden met menselijk gedrag in alle stadia van beleidsvorming. We moeten ons bewust zijn dat mensen zich niet altijd rationeel gedragen en dat er geen verandering plaats kan vinden zonder mensen mee te krijgen.



